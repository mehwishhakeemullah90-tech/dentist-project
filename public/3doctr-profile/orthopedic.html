<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    font-family:Arial;
    background:#f5f7ff;
}

/* Header */
.header{
    background:#233b7a;
    color:white;
    padding:30px;
    text-align:center;
}

/* Container */
.container{
    padding:40px;
}

/* Box */
.box{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    color:#233b7a;
}

/* Doctor Card */
.doctor{
    display:flex;
    gap:20px;
    align-items:center;
}

.doctor img{
    width:120px;
    height:120px;
    border-radius:50%;
}

/* Button */
.btn{
    background:#233b7a;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn:hover{
    background:#1a2c5c;
}
    </style>
</head>
<body>
  <div class="header">
    <h1>Orthopedic Care</h1>
</div>

<div class="container">

<div class="box">
<h2>About Bones Care</h2>
<p>We treat bone, joint and muscle problems for better movement.</p>
</div>

<div class="box doctor">
<img src="images/doctorteethpic.jpg">
<div>
<h3>Dr. Hassan</h3>
<p>Bone Specialist</p>
<button class="btn">Book appointment</button>
</div>
</div>

<div class="box">
<h2>Services</h2>
<ul>
<li>Fracture Treatment</li>
<li>Joint Pain</li>
<li>Physiotherapy</li>
</ul>
</div>



</div>
</body>
</html>
