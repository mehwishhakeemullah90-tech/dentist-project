<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0B3D3E, #1F8A70);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 35px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-card h1 {
            color: #0B3D3E;
            font-size: 24px;
            margin-bottom: 6px;
            text-align: center;
        }

        .login-card p {
            color: #777;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: #1F8A70; }

        button {
            width: 100%;
            padding: 13px;
            background-color: #1F8A70;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background-color: #176d57; }

        #message {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
            font-weight: 500;
        }

        .error { color: #d9534f; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>👨‍⚕️ Doctor Login</h1>
        <p>Apna dashboard dekhne ke liye login karen</p>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p id="message"></p>
    </div>

    <script>
        $("#loginForm").on("submit", async function (e) {
            e.preventDefault();

            const email = $("#email").val();
            const password = $("#password").val();

            try {
                const res = await fetch("/doctor-login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const result = await res.json();

                if (res.ok) {
                    // ✅ Doctor ka naam browser mein "yaad" rakh liya
                    localStorage.setItem("loggedInDoctor", result.doctorName);

                    // Dashboard par bhej diya
                    window.location.href = "/views/userdocter.html";

                } else {
                    $("#message").addClass("error").text("NO" + result.message);
                }

            } catch (error) {
                console.log("Error:", error);
                $("#message").addClass("error").text("invalid password");
            }
        });
    </script>

</body>
</html>
