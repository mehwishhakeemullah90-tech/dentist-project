<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        /* Sidebar */

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 220px;
            height: 100vh;
            background: #1e293b;
            padding-top: 20px;
        }

        .sidebar h2 {
            color: white;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: #334155;
        }

        /* Main */
        /* Main Layout */
        .container1 {
            margin-left: 220px;
            padding: 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        /* Dashboard Section */
        .main {
            flex: 2;
        }

        /* Form Section Right Side */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* Form Card */
        .form-card {
            width: 350px;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
            position: sticky;
            top: 20px;
        }

        /* Form Heading */
        .form-card h1 {
            text-align: center;
            color: #1e293b;
        }

        .form-card p {
            text-align: center;
            color: #64748b;
        }

        /* Inputs */
        .form-card input,
        .form-card select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Button */
        .form-card button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: .3s;
        }

        .form-card button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Dashboard Cards */
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .cards .card {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }

        /* Table */
        .table-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>🏥 Admin Panel</h2>

        <a href="#">Dashboard</a>
        <a href="#">Doctors</a>
        <a href="#">Patients</a>
        <a href="#">Appointments</a>
        <a href="#">Logout</a>
    </div>

    <div class="container1">

        <div class="main">

            <h1>📊 Admin Dashboard</h1>

            <div class="cards">

                <div class="card">
                    <h3>👨‍⚕️ Doctors</h3>
                    <p id="doctors">0</p>
                </div>

                <div class="card">
                    <h3>🧑‍🤝‍🧑 Patients</h3>
                    <p id="patients">0</p>
                </div>

                <div class="card">
                    <h3>📅 Appointments</h3>
                    <p id="appointments">0</p>
                </div>

            </div>

            <div class="table-box">

                <h2>📋 Latest Activity</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="activity">

                    </tbody>

                </table>

            </div>

        </div>

        <div class="form-card">
            <h1>Create Account</h1>
            <!-- <p>Apna naya account banayen</p> -->

            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <select id="role" required>
                        <option value="">Select Role</option>
                        <option value="doctor">Doctor</option>
                        <option value="manager">Manager</option>
                        <option value="assistant">Assistant</option>
                        <option value="employee">Employee</option>
                    </select>
                </div>

                <button type="submit">Create Account</button>
            </form>

            <p id="message"></p>
        </div>


        <script>


            // ---------liginpage form  homepage
            $(document).ready(function () {
                $("#loginForm").submit(function (e) {

                    e.preventDefault();

                    let email = $("#email").val();
                    let password = $("#password").val();

                    if (email === "admin@gmail.com" &&
                        password === "123456789") {

                        window.location.href = "/views/admin.html";
                    }
                    else {
                        alert("Invalid Email or Password");
                    }

                });



                // -----------------------------------------------
                // -----------------------------------------------
                // -----------------------------------------------



                $("#registerForm").on("submit", async function (e) {
                    e.preventDefault();   // page reload hone se roka

                    const data = {
                        fullName: $("#fullName").val(),
                        email: $("#email").val(),
                        password: $("#password").val(),
                        role: $("#role").val()
                    };

                    try {
                        const res = await fetch("/register", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(data)
                        });

                        const result = await res.json();
                        console.log("Response:", result);

                        if (res.ok) {
                            $("#message").removeClass("error").addClass("success")
                                .text("✅ " + result.message);
                            $("#registerForm")[0].reset();   // form khali kar diya
                        } else {
                            $("#message").removeClass("success").addClass("error")
                                .text("❌ " + result.message);
                        }

                    } catch (error) {
                        console.log("Error:", error);
                        $("#message").removeClass("success").addClass("error")
                            .text("❌ Kuch ghalat ho gaya, dobara koshish karen");
                    }
                });

            })



        </script>

</body>

</html>
