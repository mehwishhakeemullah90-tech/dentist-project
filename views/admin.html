<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Document</title>
    <style>
       /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background:#f4f7fc;
}

/* ================= Sidebar ================= */

.sidebar{
    width:260px;
    background:linear-gradient(180deg,#0f4c81,#2b7de9);
    color:#fff;
    position:fixed;
    left:0;
    top:0;
    bottom:0;
    padding:30px 20px;
    box-shadow:4px 0 15px rgba(0,0,0,.15);
}

.sidebar h2{
    text-align:center;
    margin-bottom:40px;
    font-size:25px;
}

.sidebar a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:14px 18px;
    margin-bottom:12px;
    border-radius:10px;
    transition:.3s;
    font-size:16px;
}

.sidebar a:hover{
    background:rgba(255,255,255,.18);
    transform:translateX(6px);
}

/* ================= Main Container ================= */

.container1{
    margin-left:260px;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.main{
    flex:1;
    padding:35px;
}

.main h1{
    color:#0f4c81;
    margin-bottom:30px;
    font-size:34px;
}

/* ================= Dashboard Cards ================= */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:35px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 35px rgba(43,125,233,.18);
}

.card h3{
    color:#555;
    margin-bottom:15px;
    font-size:22px;
}

.card p{
    font-size:42px;
    color:#0f4c81;
    font-weight:700;
}

/* ================= Table ================= */

.table-box{
    background:#fff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.table-box h2{
    color:#0f4c81;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
}

thead{
    background:#0f4c81;
    color:#fff;
}

th,td{
    padding:15px;
    text-align:left;
}

tbody tr{
    border-bottom:1px solid #e6e6e6;
    transition:.3s;
}

tbody tr:hover{
    background:#eef5ff;
}

th{
    font-weight:600;
}

td{
    color:#555;
}

/* ================= Footer ================= */

footer{
    background:#fff;
    text-align:center;
    padding:18px;
    font-size:15px;
    color:#555;
    border-top:1px solid #ddd;
}

/* ================= Responsive ================= */

@media(max-width:768px){

    .sidebar{
        width:220px;
    }

    .container1{
        margin-left:220px;
    }

    .main{
        padding:20px;
    }

    .main h1{
        font-size:28px;
    }

}

@media(max-width:600px){

    body{
        flex-direction:column;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .container1{
        margin-left:0;
    }

    .cards{
        grid-template-columns:1fr;
    }

    .table-box{
        overflow-x:auto;
    }

    table{
        min-width:600px;
    }

}
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>🏥 Admin Panel</h2>

        <a href="/views/registerform.html">new Registration</a>
        <a href="/public/practs2.html">Doctors</a>
        <a href="/views/assistant.html">Patients</a>
        <a href="#">Appointments</a>

        <a href="#">Logout</a>
    </div>

    <div class="container1">

        <div class="main">

            <h1>📊 Admin Dashboard</h1>

            <div class="cards">

                <div class="card">
                    <h3>👨‍⚕️ Doctors</h3>
                    <p id="doctors">0</p>
                </div>

                <div class="card">
                    <h3>🧑‍🤝‍🧑 Patients</h3>
                    <p id="patients">0</p>
                </div>

                <div class="card">
                    <h3>📅 Appointments</h3>
                    <p id="appointments">0</p>
                </div>

            </div>

            <div class="table-box">

                <h2>📋 Latest Activity</h2>

                <table>
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Doctor</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="activity">

                    </tbody>

                </table>

            </div>

        </div>

         <footer>
            © 2026 Your Clinic | Caring For Your Health
        </footer>

       
</body>

</html>
