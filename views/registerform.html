<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#2b7de9);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

/* Form Card */
.form-card{
    width:100%;
    max-width:430px;
    background:#fff;
    padding:40px 35px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.18);
    animation:fadeIn .7s ease;
}

.form-card h1{
    text-align:center;
    color:#0f4c81;
    margin-bottom:30px;
    font-size:30px;
    font-weight:700;
}

/* Form Groups */
.form-group{
    margin-bottom:20px;
}

/* Inputs */
.form-group input,
.form-group select{
    width:100%;
    padding:14px 16px;
    border:1px solid #d6d6d6;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
    background:#fafafa;
}

.form-group input:focus,
.form-group select:focus{
    border-color:#0f4c81;
    background:#fff;
    box-shadow:0 0 8px rgba(15,76,129,.25);
}

/* Placeholder */
::placeholder{
    color:#888;
}

/* Select */
select{
    cursor:pointer;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#0f4c81,#2b7de9);
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(43,125,233,.35);
}

/* Message */
#message{
    text-align:center;
    margin-top:18px;
    font-size:15px;
    font-weight:600;
}

/* Footer */
footer{
    margin-top:25px;
    color:#fff;
    font-size:14px;
    text-align:center;
    opacity:.9;
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Responsive */
@media(max-width:480px){

    .form-card{
        padding:30px 22px;
    }

    .form-card h1{
        font-size:25px;
    }

    button{
        font-size:16px;
    }

}
</style>
</head>
<body>
    
        <div class="form-card">
            <h1>Create Account</h1>
            <!-- <p>Apna naya account banayen</p> -->

            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="form-group">
                    <select id="role" required>
                        <option value="">Select Role</option>
                        <option value="doctor">Doctor</option>
                        <!-- <option value="manager">Manager</option>
                        <option value="assistant">Assistant</option> -->
                        <option value="employee">Employee</option>
                    </select>
                </div>

                <button type="submit">Create Account</button>
            </form>

            <p id="message"></p>
        </div>

         <footer>
            © 2026 Your Clinic | Caring For Your Health
        </footer>


        <script>
            $(document).ready(function () {

                $("#registerForm").on("submit", async function (e) {
                    e.preventDefault();   // page reload hone se roka

                    const data = {
                        fullName: $("#fullName").val(),
                        email: $("#email").val(),
                        password: $("#password").val(),
                        role: $("#role").val()
                    };

                    try {
                        const res = await fetch("/register", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(data)
                        });

                        const result = await res.json();
                        console.log("Response:", result);

                        if (res.ok) {
                            $("#message").removeClass("error").addClass("success")
                                .text("✅ " + result.message);
                            $("#registerForm")[0].reset();   // form khali kar diya
                        } else {
                            $("#message").removeClass("success").addClass("error")
                                .text("❌ " + result.message);
                        }

                    } catch (error) {
                        console.log("Error:", error);
                        $("#message").removeClass("success").addClass("error")
                            .text("❌ Kuch ghalat ho gaya, dobara koshish karen");
                    }
                });

            })



        </script>
</body>
</html>
