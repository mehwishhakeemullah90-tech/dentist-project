<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Doctor — Dental Clinic</title>
    <!-- FIX: jQuery was missing — $() threw ReferenceError -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: linear-gradient(135deg, #0f4c81, #2b7de9);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
}

.form-card {
    width: 100%;
    max-width: 430px;
    background: #fff;
    padding: 40px 35px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,.18);
    animation: fadeIn .7s ease;
}

.form-card h1 {
    text-align: center;
    color: #0f4c81;
    margin-bottom: 6px;
    font-size: 28px;
    font-weight: 700;
}

.form-card p.subtitle {
    text-align: center;
    color: #888;
    font-size: 13px;
    margin-bottom: 28px;
}

.form-group { margin-bottom: 18px; }

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid #d6d6d6;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
    transition: .3s;
    background: #fafafa;
}

.form-group input:focus,
.form-group select:focus {
    border-color: #0f4c81;
    background: #fff;
    box-shadow: 0 0 8px rgba(15,76,129,.2);
}

::placeholder { color: #aaa; }

select { cursor: pointer; }

button[type="submit"] {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #0f4c81, #2b7de9);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: .3s;
    margin-top: 4px;
}

button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(43,125,233,.35);
}

#message {
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 600;
    min-height: 20px;
}

.error   { color: #d9534f; }
.success { color: #1F8A70; }

.back-link {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
}

.back-link a { color: #2b7de9; text-decoration: none; }
.back-link a:hover { text-decoration: underline; }

footer { margin-top: 24px; color: #fff; font-size: 13px; text-align: center; opacity: .85; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
    .form-card { padding: 28px 20px; }
    .form-card h1 { font-size: 23px; }
}
    </style>
</head>
<body>

    <div class="form-card">
        <h1>➕ Create Account</h1>
        <p class="subtitle">Register a new Doctor account</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. Dr. Ahmed Ali" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="doctor@clinic.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters" required>
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <!-- FIX: removed "employee" — only Doctor role is valid in this system -->
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="doctor">Doctor</option>
                    <option value="assistant">Assistant</option>
                    <option value="employee">Employee</option>
                    <option value="employee">Employee</option>
                </select>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p id="message"></p>

        <div class="back-link">
            <a href="/admin">← Back to Admin Dashboard</a>
        </div>
    </div>

    <footer>© 2026 Your Clinic | Caring For Your Health</footer>

    <script>
        $("#registerForm").on("submit", async function (e) {
            e.preventDefault();

            const data = {
                fullName: $("#fullName").val().trim(),
                email:    $("#email").val().trim(),
                password: $("#password").val(),
                role:     $("#role").val()
            };

            if (!data.role) {
                $("#message").removeClass("success").addClass("error").text("❌ Please select a role");
                return;
            }

            if (data.password.length < 6) {
                $("#message").removeClass("success").addClass("error").text("❌ Password must be at least 6 characters");
                return;
            }

            try {
                const res = await fetch("/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    $("#message").removeClass("error").addClass("success").text("✅ " + result.message);
                    $("#registerForm")[0].reset();
                } else {
                    $("#message").removeClass("success").addClass("error").text("❌ " + result.message);
                }

            } catch (err) {
                $("#message").removeClass("success").addClass("error").text("❌ Server error. Please try again.");
            }
        });
    </script>

</body>
</html>
