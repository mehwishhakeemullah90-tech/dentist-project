    <title>Assistant Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* ── Top header bar ── */
        .top-header {
            background: linear-gradient(135deg, #0f4c81, #2b7de9);
            color: #fff;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-header .title { font-size: 18px; font-weight: 700; }
        .top-header .user-info { display: flex; align-items: center; gap: 14px; font-size: 14px; }
        .btn-logout-top {
            background: rgba(255,255,255,.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,.3);
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
        }
        .btn-logout-top:hover { background: rgba(255,255,255,.25); color: #fff; }
    </style>
    <style>

        /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Main Container */

.container-fluid{
    width:95%;
    max-width:1300px;
    margin:35px auto;
}

/* Dashboard Box */

.dashboard-heading{
    background:#fff;
    border-radius:18px;
    padding:30px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    border-bottom:2px solid #eef2f7;
    padding-bottom:15px;
}

.header h2{
    color:#0f4c81;
    font-size:30px;
    font-weight:700;
}

/* Table */

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
    overflow:hidden;
}

thead{
    background:linear-gradient(135deg,#0f4c81,#2b7de9);
    color:#fff;
}

th{
    padding:16px;
    text-align:left;
    font-size:15px;
    font-weight:600;
}

td{
    padding:18px 15px;
    color:#444;
    border-bottom:1px solid #e9ecef;
    vertical-align:middle;
    font-size:14px;
}

.action-cell{
    white-space:nowrap;
}

.num-col{
    width:50px;
    text-align:center;
}

td.num-cell{
    text-align:center;
    font-weight:600;
    color:#0f4c81;
}

tbody tr{
    transition:.3s;
}

tbody tr:hover{
    background:#eef5ff;
}

/* Editing Row */

.editing{
    background:#fff8e6 !important;
}

/* Inputs */

.edit-input{
    width:100%;
    padding:9px 12px;
    border:1px solid #cfd8dc;
    border-radius:8px;
    outline:none;
    font-size:14px;
    transition:.3s;
}

.edit-input:focus{
    border-color:#0f4c81;
    box-shadow:0 0 8px rgba(43,125,233,.2);
}

/* Buttons */

.btn{
    border:none;
    border-radius:7px;
    padding:8px 18px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    margin:3px 2px;
    display:inline-block;
}

/* Edit */

.btn-primary{
    background:#2b7de9;
    color:#fff;
}

.btn-primary:hover{
    background:#1666d3;
    transform:translateY(-2px);
}

/* Delete */

.btn-danger{
    background:#e53935;
    color:#fff;
}

.btn-danger:hover{
    background:#c62828;
    transform:translateY(-2px);
}

/* Save */

.btn-success{
    background:#28a745;
    color:#fff;
}

.btn-success:hover{
    background:#1f8a37;
    transform:translateY(-2px);
}

/* Cancel */

.btn-secondary{
    background:#6c757d;
    color:#fff;
}

.btn-secondary:hover{
    background:#555d64;
    transform:translateY(-2px);
}

/* Footer */

footer{
    margin-top:auto;
    background:#0f4c81;
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:14px;
    letter-spacing:.5px;
}

/* Responsive */

@media(max-width:768px){

    .dashboard-heading{
        padding:20px;
    }

    .header h2{
        font-size:24px;
    }

    table{
        min-width:800px;
    }

}

<body>

<!-- ── Top header (name + logout) ── -->
<div class="top-header">
    <span class="title">🩺 Assistant Dashboard</span>
    <div class="user-info">
        <span id="headerName">Loading…</span>
        <a href="/logout" class="btn-logout-top">Logout</a>
    </div>
</div>

    <div class="container-fluid p-2">
        <div class="dashboard-heading">
            <div class="header">
                <h2>Assistant Dashboard</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th class="num-col">#</th>
                            <th>Naam</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Doctor</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>© 2026 Your Clinic | Caring For Your Health</footer>

    <script>
        let isEditing = false;
        let autoRefresh;

        function startAutoRefresh() {
            autoRefresh = setInterval(function () {
                if (!isEditing) loadAppointments();
            }, 3000);
        }

        function loadAppointments() {
            $.get("/getall", function (appointments) {
                $("#tableBody").empty();
                appointments.forEach(function (item, index) {
                    let row = `
                        <tr data-id="${item._id}">
                            <td class="num-cell">${index + 1}</td>
                            <td>${item.patientName}</td>
                            <td>${item.patientEmail}</td>
                            <td>${item.patientPhone}</td>
                            <td>${item.Docter}</td>
                            <td>${item.appointmentDate}</td>
                            <td>${item.appointmentTime}</td>
                            <td class="action-cell">
                                <button class="btn btn-primary btn-sm edit-btn">Edit</button>
                                <button class="btn btn-danger btn-sm delete-btn">Delete</button>
                            </td>
                        </tr>`;
                    $("#tableBody").append(row);
                });
            }).fail(function (error) {
                console.log("error:", error);
            });
        }

        // Edit button click — row ko inputs mein badlo
        $(document).on("click", ".edit-btn", function () {
            const $row = $(this).closest("tr");
            const $tds = $row.find("td");

            const name  = $tds.eq(1).text();
            const email = $tds.eq(2).text();
            const phone = $tds.eq(3).text();
            const doc   = $tds.eq(4).text();
            const date  = $tds.eq(5).text();
            const time  = $tds.eq(6).text();

            $tds.eq(1).html(`<input class="edit-input" type="text"  value="${name}">`);
            $tds.eq(2).html(`<input class="edit-input" type="email" value="${email}">`);
            $tds.eq(3).html(`<input class="edit-input" type="text"  value="${phone}">`);
            $tds.eq(4).html(`<input class="edit-input" type="text"  value="${doc}">`);
            $tds.eq(5).html(`<input class="edit-input" type="date"  value="${date}">`);
            $tds.eq(6).html(`<input class="edit-input" type="time"  value="${time}">`);
            $tds.eq(7).html(`
                <button class="btn btn-success btn-sm save-btn">Save</button>
                <button class="btn btn-secondary btn-sm cancel-btn">Cancel</button>
            `);

            $row.addClass("editing");
            isEditing = true;
        });

        // Save button — server ko update bhejo
        $(document).on("click", ".save-btn", async function () {
            const $row = $(this).closest("tr");
            const id   = $row.data("id");
            const $tds = $row.find("td");

            const body = {
                patientName:     $tds.eq(1).find("input").val(),
                patientEmail:    $tds.eq(2).find("input").val(),
                patientPhone:    $tds.eq(3).find("input").val(),
                Docter:          $tds.eq(4).find("input").val(),
                appointmentDate: $tds.eq(5).find("input").val(),
                appointmentTime: $tds.eq(6).find("input").val()
            };

            try {
                const res  = await fetch(`/updateAppointment/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!data || data.message === "Appointment not found") {
                    alert("Update nahi hua, dobara try karein.");
                }
            } catch (err) {
                alert("Server error.");
            }

            isEditing = false;
            loadAppointments();
        });

        // Cancel — kuch mat karo, wapas normal view
        $(document).on("click", ".cancel-btn", function () {
            isEditing = false;
            loadAppointments();
        });

        // Delete
        $(document).on("click", ".delete-btn", async function () {
            const id = $(this).closest("tr").data("id");
            await fetch(`/deleteAppointment/${id}`, { method: "DELETE" });
            loadAppointments();
        });

        $(document).ready(function () {
            // Verify session is valid; redirect to login if not
            $.get("/api/me")
                .done(function (data) {
                    if (data.success && data.role === "assistant") {
                        $("#headerName").text(data.name);
                        loadAppointments();
                        startAutoRefresh();
                    } else {
                        window.location.href = "/login";
                    }
                })
                .fail(function () {
                    window.location.href = "/login";
                });
        });
    </script>

</body>

</html>
