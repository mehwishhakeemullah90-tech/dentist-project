<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Assistant Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background: #f4f7fc;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Dashboard Container */
        .container-fluid {
            padding: 40px;
        }

        /* Card */
        .dashboard-card {
            background: #fff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        /* Heading */
        .dashboard-card h2 {
            text-align: center;
            color: #0d6efd;
            font-weight: bold;
            margin-bottom: 25px;
        }


        .header{
    width:100%;
    background:linear-gradient(135deg,#0d6efd,#4f46e5);
    padding:18px 25px;
    border-radius:12px;
    margin-bottom:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.header h2{
    margin:0;
    color:#fff;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    text-align:center;
    text-transform:uppercase;
}

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        /* Header */
        thead {
            background: #0d6efd;
            color: white;
        }

        thead th {
            padding: 15px;
            text-align: center;
            font-size: 16px;
            letter-spacing: .5px;
        }

        /* Body */
        tbody td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
            transition: .3s;
        }

        /* Alternate Row Color */
        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        /* Hover Effect */
        tbody tr:hover {
            background: #dbeafe;
            cursor: pointer;
            transform: scale(1.01);
            transition: 0.3s ease;
        }

        /* Responsive */
        .table-responsive {
            overflow-x: auto;
            border: 2px solid grey;
        }

        /* Scrollbar */
        .table-responsive::-webkit-scrollbar {
            height: 8px;
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: #0d6efd;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container-fluid p-2">
        <div class="dashboard-heading">
            <div class="header">
                <h2>Assistant Dashboard</h2>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Naam</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>doctor</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Ation</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        <!-- Data yahan jQuery se aayega -->
                    </tbody>
                    
                </table>
               
            </div>
              <div id="users"></div>
        </div>
    </div>

     <footer>
            © 2026 Your Clinic | Caring For Your Health
        </footer>

    <script>
        // Function jo data load kar ke table mein dikhata hai
        function loadAppointments() {
            $.get("/getall", function (appointments) {

                $("#tableBody").empty(); // pehle purana data hata diya

                appointments.forEach(function (item) {
                    let row = `
                        <tr>
                            <td>${item.patientName}</td>
                            <td>${item.patientEmail}</td>
                            <td>${item.patientPhone}</td>
                            <td>${item.Docter}</td>
                            <td>${item.appointmentDate}</td>
                            <td>${item.appointmentTime}</td>

                            <td>
                                <button class="btn btn-primary btn-sm"
                                onclick="editUser('${item._id}')">
                                Edit
                                </button>

                                <button class="btn btn-danger btn-sm"
                                onclick="deleteUser('${item._id}')">
                                Delet
                                </button>
                            </td>
                        </tr>
                    `;
                    $("#tableBody").append(row);
                });
            }).fail(function (error) {
                console.log("error is here", error)
            })
        }

        
        $(document).ready(function () {
            loadAppointments();
            setInterval(loadAppointments, 3000);
        })
        // --------------------------------------------------------------
        // --------------------------------------------------------------
        // --------------------------------------------------------------


            //  let editUserId = null;

        window.editUser = async function (id) {
            editUserId = id;
            let html = `
                <h3>Edit Appointment</h3>
                <input id="editName" type="text" placeholder="New Name">
                <input id="editEmail" type="text" placeholder="New Email">
                <input id="editPhone" type="text" placeholder="New Phone">
                <input id="editDocter" type="text" placeholder="Doctor Name">
                <input id="editDate" type="date">
                <input id="editTime" type="time">
                <button id="updateBtn" class="btn btn-success btn-sm">Update</button>
            `;
            $("#users").html(html);
        };

        $(document).on("click", "#updateBtn", async function () {
             
            console.log("Updating ID:", editUserId);

            const patientName = $("#editName").val();
            const patientEmail = $("#editEmail").val();
            const patientPhone = $("#editPhone").val();
            const Docter = $("#editDocter").val();       
            const appointmentDate = $("#editDate").val();
            const appointmentTime = $("#editTime").val();

            const res = await fetch(`/updateAppointment/${editUserId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    patientName,
                    patientEmail,
                    patientPhone,
                    Docter,                               
                    appointmentDate,
                    appointmentTime
                })
            });

            const data = await res.json();
            console.log("Updated:", data);

             if (!data || data.message === "Appointment not found") {
                    alert("not wroking check again ");
                    loadAppointments();
                    return;
                }

            $("#users").html("");   // edit form band kar diya
            loadAppointments();
        });

        window.deleteUser = async function (id) {
            const res = await fetch(`/deleteAppointment/${id}`, { method: "DELETE" });
            const data = await res.json();
            console.log("Deleted:", data);
            loadAppointments();
        };

        // -----------------------------------------------------
        // -----------------------------------------------------
        // -----------------------------------------------------

    </script>

</body>

</html>
