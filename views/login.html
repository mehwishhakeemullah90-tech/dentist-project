<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    
        /* Fixed Admin Button */

.admin-fixed {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
}

.admin-fixed button {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    transition: .3s;
}

.admin-fixed button:hover {
    transform: translateY(-2px);
}

/* Overlay */

.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);

    justify-content: center;
    align-items: center;

    z-index: 9999;
}

/* Login Box */

.login-box {
    background: white;
    width: 350px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,.3);
    position: relative;
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.login-box button:hover {
    background: #0b5ed7;
}

/* Close Button */

.close-btn {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 25px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <!-- Fixed Admin Button -->
<div class="admin-fixed">
    <button onclick="openLogin()">SignUp</button>
</div>

<!-- Overlay -->
<div id="overlay" class="overlay">

    <div class="login-box">

        <span class="close-btn" onclick="closeLogin()"> × </span>

        <h2>SignUp</h2>

        <form action="/SignUp" method="POST">

            <!-- <input
                type="admin@gmail.com"
                name="ali muhammad"
                placeholder="Admin ID"
                required>

            <input
                type="12345678"
                name="12345678"
                placeholder="Password"
                required> -->

            <button type="signup">
                Login
            </button>

        </form>

    </div>

</div>


<script>

function openLogin() {
    document.getElementById("overlay").style.display = "flex";
}

function closeLogin() {
    document.getElementById("overlay").style.display = "none";
}


</script>
</body>
</html>
